# Fly.io — Team Portal V1 (https://fly.io/docs/reference/configuration/)
app = 'team-portal-v1'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  FLASK_DEBUG = '0'
  TEAM_TRACKER_DB_PATH = '/app/data/team_tracker.db'
  TEAM_TRACKER_PRODUCTION = '1'
  TEAM_TRACKER_DB_BACKUP_INTERVAL_HOURS = '2'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'team_portal_data'
  destination = '/app/data'
